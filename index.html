<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Poppins:ital,wght@0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>Page 1</title>
  </head>
  <body>
    <section class="container">
      <h1>Hi, Kia</h1>
    </section>
    <script>
      $(document).ready(function () {
        var texts = [
          "Happy Valentine's Day",
          "I made this for u",
          "I apologize if it's not clean.",
          "I've tried my best :(",
          "",
        ];
        var counter = 0;

        function changeText() {
          $("h1").fadeOut(500, function () {
            $(this).text(texts[counter]).fadeIn(500);
            if (counter === texts.length - 1) {
              clearInterval(intervalId);
              var button = document.createElement("button");
              button.innerText = "♡";

              $("section").append(button);

              button.addEventListener("click", function () {
                // Perform the desired action here
                window.location.href = "./II/index.html";
              });

              $(button).fadeOut(0, function () {
                $(button).fadeIn(500);
              });
            }
            counter = (counter + 1) % texts.length;
          });
        }

        var intervalId = setInterval(changeText, 3000);
      });
    </script>
  </body>
</html>
